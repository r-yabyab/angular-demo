<div>

    @if (errorMessage) {
        <p class="text-red-600 font-semibold">{{ errorMessage }}</p>
    }

    <input 
        type="text"
        placeholder="username"
        [(ngModel)] = "username"
    />
    <input 
        type="password"
        placeholder="password"
        [(ngModel)] = "password"
        
    />

    <p>hint: username: emilys, password: emilyspass</p>

    @if (username.length && password.length > 0) {
        <button 
            class="bg-amber-300 border-2"
            (click)="loginSubmit()"
        >
            login
        </button>
    }

</div>
