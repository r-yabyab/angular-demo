<div class="border rounded-lg p-4 shadow-md">
    <img [src]="product.thumbnail" [alt]="product.title" class="w-full h-48 object-cover rounded-md mb-4" />
    <h3 class="text-lg font-semibold mb-2">{{ product.title }}</h3>
    <p class="text-gray-600 mb-2">{{ product.description }}</p>
    <div class="flex justify-between items-center">
        <span class="text-xl font-bold text-green-600">{{ product.price | currency }}</span>
        <span class="text-sm text-gray-500">Rating: {{ product.rating }}</span>
    </div>
    <div class="mt-2">
        <span class="text-sm text-gray-700">Brand: {{ product.brand }}</span>
        <span class="ml-4 text-sm text-gray-700">Stock: {{ product.stock }}</span>
    </div>
</div>
